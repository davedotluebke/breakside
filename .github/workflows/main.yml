name: Deploy to S3 and CloudFront

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'ultistats_server/**'
      - 'data/**'
      - 'scripts/**'
      - '*.md'
      - '*.py'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Increment build version
        run: |
          # Skip if version.json was already modified in this commit
          # (means the pre-commit hook already bumped it)
          if git diff HEAD~1 --name-only | grep -q "^version.json$"; then
            echo "Version already bumped in this commit, skipping"
          else
            python3 increment-version.py build
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add version.json service-worker.js
            git commit -m "Auto-increment build version"
            git push
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync PWA files to S3 (except service worker)
        run: |
          aws s3 sync . s3://breakside.pro/ \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "ultistats_server/*" \
            --exclude "data/*" \
            --exclude "scripts/*" \
            --exclude "*.py" \
            --exclude "__pycache__/*" \
            --exclude "*.md" \
            --exclude ".DS_Store" \
            --exclude "*.wav" \
            --exclude "*.ogg" \
            --exclude "*.m4a" \
            --exclude "*.webm" \
            --exclude "service-worker.js" \
            --delete

      - name: Sync service worker with no-cache headers
        run: |
          aws s3 cp service-worker.js s3://breakside.pro/service-worker.js \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/javascript"

      - name: Sync viewer to S3
        run: |
          aws s3 sync ultistats_server/static/viewer/ s3://breakside.pro/viewer/

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E6M9KCXIU9CKD \
            --paths "/*"

      - name: Deployment complete
        run: |
          echo "✅ Deployed to https://www.breakside.pro"
          echo "📦 CloudFront invalidation started"
