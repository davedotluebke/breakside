name: Deploy to S3 and CloudFront

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'ultistats_server/**'
      - 'data/**'
      - 'scripts/**'
      - '*.md'
      - '*.py'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history: the deploy-time build number is git rev-list --count HEAD
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Stamp deploy-time build number
        # Writes the build number (git rev-list --count HEAD) and a deployStamp
        # into version.json and the service-worker cacheName in this checkout
        # only — nothing is committed or pushed back. See VERSIONING.md.
        run: |
          python3 increment-version.py stamp --deploy-stamp "$(date -u +%Y%m%d%H%M%S)"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync PWA files to S3 (except service worker and version.json)
        run: |
          EXCLUDES=()
          while IFS= read -r pattern; do
            [[ -z "$pattern" || "$pattern" == \#* ]] && continue
            EXCLUDES+=(--exclude "$pattern")
          done < scripts/deploy-excludes.txt
          aws s3 sync . s3://breakside.pro/ "${EXCLUDES[@]}" --delete

      - name: Upload stamped version.json with no-cache headers
        run: |
          aws s3 cp version.json s3://breakside.pro/version.json \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/json"

      - name: Upload stamped service worker with no-cache headers
        run: |
          aws s3 cp service-worker.js s3://breakside.pro/service-worker.js \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/javascript"

      - name: Sync viewer to S3
        run: |
          aws s3 sync ultistats_server/static/viewer/ s3://breakside.pro/viewer/

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E6M9KCXIU9CKD \
            --paths "/*"

      - name: Deployment complete
        run: |
          echo "✅ Deployed to https://www.breakside.pro"
          echo "📦 CloudFront invalidation started"
