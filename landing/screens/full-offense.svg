<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 470" font-family="'Space Grotesk',sans-serif">
  <rect width="270" height="470" fill="#111827"/>
  <!-- header -->
  <rect width="270" height="56" fill="#EB8232"/>
  <text x="16" y="34" fill="#fff" font-size="15" font-weight="700">7 – 6</text>
  <rect x="196" y="14" width="58" height="28" rx="14" fill="#10B981"/>
  <text x="225" y="33" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">Offense</text>
  <!-- tabs -->
  <rect x="12" y="68" width="246" height="26" rx="13" fill="#1F2937"/>
  <text x="43" y="85" fill="#9CA3AF" font-size="10" text-anchor="middle">Simple</text>
  <rect x="78" y="70" width="44" height="22" rx="11" fill="#EB8232"/>
  <text x="100" y="85" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">Full</text>
  <text x="143" y="85" fill="#9CA3AF" font-size="10" text-anchor="middle">Field</text>
  <text x="186" y="85" fill="#9CA3AF" font-size="10" text-anchor="middle">Line</text>
  <text x="226" y="85" fill="#9CA3AF" font-size="10" text-anchor="middle">Log</text>
  <!-- player rows -->
  <g font-size="11">
    <g>
      <rect x="14" y="104" width="242" height="38" rx="8" fill="#1F2937"/>
      <circle cx="30" cy="123" r="8" fill="#EB8232"/>
      <text x="46" y="127" fill="#fff" font-weight="600">Alice</text>
      <rect x="120" y="111" width="40" height="22" rx="6" fill="#10B981"/><text x="140" y="126" fill="#fff" font-size="9" text-anchor="middle">Score</text>
      <rect x="164" y="111" width="40" height="22" rx="6" fill="#EF4444"/><text x="184" y="126" fill="#fff" font-size="9" text-anchor="middle">Drop</text>
      <rect x="208" y="111" width="44" height="22" rx="6" fill="#374151"/><text x="230" y="126" fill="#E5E7EB" font-size="9" text-anchor="middle">Throw</text>
    </g>
    <g transform="translate(0,42)">
      <rect x="14" y="104" width="242" height="38" rx="8" fill="#1F2937"/>
      <circle cx="30" cy="123" r="8" fill="#8B5CF6"/>
      <text x="46" y="127" fill="#fff" font-weight="600">Bob</text>
      <rect x="120" y="111" width="40" height="22" rx="6" fill="#10B981"/><text x="140" y="126" fill="#fff" font-size="9" text-anchor="middle">Score</text>
      <rect x="164" y="111" width="40" height="22" rx="6" fill="#EF4444"/><text x="184" y="126" fill="#fff" font-size="9" text-anchor="middle">Drop</text>
      <rect x="208" y="111" width="44" height="22" rx="6" fill="#374151"/><text x="230" y="126" fill="#E5E7EB" font-size="9" text-anchor="middle">Throw</text>
    </g>
    <g transform="translate(0,84)">
      <rect x="14" y="104" width="242" height="38" rx="8" fill="#1F2937"/>
      <circle cx="30" cy="123" r="8" fill="#2DD4BF"/>
      <text x="46" y="127" fill="#fff" font-weight="600">Carla</text>
      <rect x="120" y="111" width="40" height="22" rx="6" fill="#10B981"/><text x="140" y="126" fill="#fff" font-size="9" text-anchor="middle">Score</text>
      <rect x="164" y="111" width="40" height="22" rx="6" fill="#EF4444"/><text x="184" y="126" fill="#fff" font-size="9" text-anchor="middle">Drop</text>
      <rect x="208" y="111" width="44" height="22" rx="6" fill="#374151"/><text x="230" y="126" fill="#E5E7EB" font-size="9" text-anchor="middle">Throw</text>
    </g>
  </g>
  <!-- modifier chips -->
  <text x="16" y="285" fill="#9CA3AF" font-size="9">Last pass was a:</text>
  <g font-size="9" font-weight="600" text-anchor="middle">
    <rect x="14" y="292" width="44" height="22" rx="11" fill="#EB8232"/><text x="36" y="307" fill="#fff">huck</text>
    <rect x="62" y="292" width="44" height="22" rx="11" fill="#374151"/><text x="84" y="307" fill="#E5E7EB">break</text>
    <rect x="110" y="292" width="44" height="22" rx="11" fill="#374151"/><text x="132" y="307" fill="#E5E7EB">reset</text>
    <rect x="158" y="292" width="50" height="22" rx="11" fill="#374151"/><text x="183" y="307" fill="#E5E7EB">hammer</text>
    <rect x="212" y="292" width="42" height="22" rx="11" fill="#374151"/><text x="233" y="307" fill="#E5E7EB">layout</text>
  </g>
  <!-- mini log -->
  <rect x="14" y="324" width="242" height="130" rx="8" fill="#0B1220" stroke="#1F2937"/>
  <g font-size="10" fill="#9CA3AF">
    <text x="24" y="344">Alice → Bob  (huck)</text>
    <text x="24" y="364">Bob → Carla</text>
    <text x="24" y="384" fill="#10B981">Carla scores!  assist: Bob</text>
    <text x="24" y="404">— point 14 —</text>
  </g>
</svg>
