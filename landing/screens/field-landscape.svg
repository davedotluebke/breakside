<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 200" font-family="'Space Grotesk',sans-serif">
  <rect width="380" height="200" fill="#0b1220"/>
  <!-- full-bleed field (chrome dropped away) -->
  <rect x="6" y="8" width="368" height="184" rx="8" fill="#15803D"/>
  <!-- endzones left/right -->
  <rect x="6" y="8" width="62" height="184" fill="#166534"/>
  <rect x="312" y="8" width="62" height="184" fill="#166534"/>
  <line x1="68" y1="8" x2="68" y2="192" stroke="#86efac" stroke-width="1.5" opacity=".7"/>
  <line x1="312" y1="8" x2="312" y2="192" stroke="#86efac" stroke-width="1.5" opacity=".7"/>
  <circle cx="190" cy="100" r="3" fill="#bbf7d0" opacity=".6"/>
  <!-- side labels -->
  <text x="37" y="104" fill="#bbf7d0" font-size="10" text-anchor="middle" opacity=".8" transform="rotate(-90 37 104)">Defend</text>
  <text x="343" y="104" fill="#bbf7d0" font-size="10" text-anchor="middle" opacity=".8" transform="rotate(-90 343 104)">Attack ▶</text>
  <text x="190" y="22" fill="#bbf7d0" font-size="9" text-anchor="middle" opacity=".7">Home ▲</text>
  <!-- pass path -->
  <line x1="120" y1="140" x2="230" y2="80" stroke="#fde68a" stroke-width="2.5" stroke-dasharray="5 4"/>
  <line x1="230" y1="80" x2="330" y2="105" stroke="#fff" stroke-width="2.5"/>
  <!-- players -->
  <circle cx="120" cy="140" r="11" fill="#EB8232" stroke="#fff" stroke-width="2"/><text x="120" y="144" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">A</text>
  <circle cx="230" cy="80" r="11" fill="#8B5CF6" stroke="#fff" stroke-width="2"/><text x="230" y="84" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">B</text>
  <circle cx="330" cy="105" r="9" fill="#fff" stroke="#EB8232" stroke-width="2"/>
  <!-- floating action row -->
  <g font-size="9" font-weight="600" text-anchor="middle">
    <rect x="150" y="172" width="38" height="20" rx="6" fill="#10B981"/><text x="169" y="186" fill="#fff">Score</text>
    <rect x="192" y="172" width="38" height="20" rx="6" fill="#EF4444"/><text x="211" y="186" fill="#fff">Drop</text>
    <rect x="234" y="172" width="38" height="20" rx="6" fill="#374151"/><text x="253" y="186" fill="#E5E7EB">D</text>
  </g>
</svg>
