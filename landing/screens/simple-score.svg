<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 470" font-family="'Space Grotesk',sans-serif">
  <rect width="270" height="470" fill="#111827"/>
  <!-- dimmed background app -->
  <g opacity="0.35">
    <rect width="270" height="56" fill="#EB8232"/>
    <rect x="20" y="120" width="230" height="80" rx="14" fill="#10B981"/>
    <rect x="20" y="216" width="230" height="80" rx="14" fill="#EF4444"/>
    <rect x="20" y="312" width="230" height="80" rx="14" fill="#3B82F6"/>
  </g>
  <rect width="270" height="470" fill="#000" opacity="0.45"/>
  <!-- modal -->
  <rect x="22" y="120" width="226" height="230" rx="16" fill="#1F2937" stroke="#374151"/>
  <text x="135" y="150" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">Who scored?</text>
  <text x="135" y="170" fill="#9CA3AF" font-size="10" text-anchor="middle">Tap the scorer, then the assist</text>
  <!-- player chips -->
  <g font-size="11" font-weight="600" text-anchor="middle">
    <rect x="40" y="186" width="86" height="30" rx="15" fill="#EB8232"/><text x="83" y="206" fill="#fff">Carla</text>
    <rect x="144" y="186" width="86" height="30" rx="15" fill="#374151"/><text x="187" y="206" fill="#E5E7EB">Bob</text>
    <rect x="40" y="224" width="86" height="30" rx="15" fill="#374151"/><text x="83" y="244" fill="#E5E7EB">Alice</text>
    <rect x="144" y="224" width="86" height="30" rx="15" fill="#374151"/><text x="187" y="244" fill="#E5E7EB">Dana</text>
    <rect x="40" y="262" width="86" height="30" rx="15" fill="#374151"/><text x="83" y="282" fill="#E5E7EB">Eve</text>
    <rect x="144" y="262" width="86" height="30" rx="15" fill="#374151"/><text x="187" y="282" fill="#E5E7EB">Kris</text>
  </g>
  <rect x="40" y="304" width="190" height="32" rx="8" fill="#10B981"/>
  <text x="135" y="325" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">Confirm Goal</text>
</svg>
