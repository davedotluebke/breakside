<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 470" font-family="'Space Grotesk',sans-serif">
  <rect width="270" height="470" fill="#111827"/>
  <!-- header -->
  <rect width="270" height="46" fill="#EB8232"/>
  <text x="16" y="29" fill="#fff" font-size="14" font-weight="700">Next Line</text>
  <rect x="176" y="11" width="78" height="24" rx="6" fill="rgba(0,0,0,.18)"/>
  <text x="215" y="28" fill="#fff" font-size="11" text-anchor="middle">4 ♀ / 3 ♂</text>
  <!-- column headers -->
  <text x="20" y="68" fill="#9CA3AF" font-size="10">Player</text>
  <text x="200" y="68" fill="#9CA3AF" font-size="10" text-anchor="middle">Pts</text>
  <text x="240" y="68" fill="#9CA3AF" font-size="10" text-anchor="middle">On Deck</text>
  <!-- roster rows: selected = orange ring, count colored by playing time -->
  <g font-size="12">
    <g transform="translate(0,0)">
      <rect x="14" y="78" width="242" height="34" rx="8" fill="#1F2937" stroke="#EB8232" stroke-width="2"/>
      <text x="26" y="100" fill="#fff" font-weight="600">Alice</text>
      <text x="200" y="100" fill="#10B981" text-anchor="middle">6</text>
      <text x="240" y="100" fill="#9CA3AF" text-anchor="middle">7</text>
    </g>
    <g transform="translate(0,40)">
      <rect x="14" y="78" width="242" height="34" rx="8" fill="#1F2937" stroke="#EB8232" stroke-width="2"/>
      <text x="26" y="100" fill="#fff" font-weight="600">Bob</text>
      <text x="200" y="100" fill="#F59E0B" text-anchor="middle">9</text>
      <text x="240" y="100" fill="#9CA3AF" text-anchor="middle">10</text>
    </g>
    <g transform="translate(0,80)">
      <rect x="14" y="78" width="242" height="34" rx="8" fill="#1F2937" stroke="#EB8232" stroke-width="2"/>
      <text x="26" y="100" fill="#fff" font-weight="600">Carla</text>
      <text x="200" y="100" fill="#10B981" text-anchor="middle">5</text>
      <text x="240" y="100" fill="#9CA3AF" text-anchor="middle">6</text>
    </g>
    <g transform="translate(0,120)">
      <rect x="14" y="78" width="242" height="34" rx="8" fill="#0B1220" stroke="#374151"/>
      <text x="26" y="100" fill="#9CA3AF">Dana</text>
      <text x="200" y="100" fill="#EF4444" text-anchor="middle">11</text>
      <text x="240" y="100" fill="#6B7280" text-anchor="middle">11</text>
    </g>
    <g transform="translate(0,160)">
      <rect x="14" y="78" width="242" height="34" rx="8" fill="#0B1220" stroke="#374151"/>
      <text x="26" y="100" fill="#9CA3AF">Eve</text>
      <text x="200" y="100" fill="#10B981" text-anchor="middle">4</text>
      <text x="240" y="100" fill="#6B7280" text-anchor="middle">4</text>
    </g>
    <g transform="translate(0,200)">
      <rect x="14" y="78" width="242" height="34" rx="8" fill="#1F2937" stroke="#EB8232" stroke-width="2"/>
      <text x="26" y="100" fill="#fff" font-weight="600">Kris</text>
      <text x="200" y="100" fill="#10B981" text-anchor="middle">6</text>
      <text x="240" y="100" fill="#9CA3AF" text-anchor="middle">7</text>
    </g>
  </g>
  <!-- footer buttons -->
  <rect x="14" y="402" width="150" height="48" rx="10" fill="#10B981"/>
  <text x="89" y="431" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Start Point (O)</text>
  <rect x="172" y="402" width="84" height="48" rx="10" fill="#374151"/>
  <text x="214" y="425" fill="#E5E7EB" font-size="11" text-anchor="middle">Lineup</text>
  <text x="214" y="439" fill="#E5E7EB" font-size="11" text-anchor="middle">Ready</text>
</svg>
