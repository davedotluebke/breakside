<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 470" font-family="'Space Grotesk',sans-serif">
  <rect width="270" height="470" fill="#111827"/>
  <!-- header -->
  <rect width="270" height="46" fill="#EB8232"/>
  <text x="16" y="29" fill="#fff" font-size="14" font-weight="700">7 – 6</text>
  <text x="254" y="29" fill="#fff" font-size="11" text-anchor="end" opacity=".85">↻ rotate for full screen</text>
  <!-- field -->
  <rect x="22" y="58" width="226" height="372" rx="10" fill="#15803D"/>
  <!-- endzones -->
  <rect x="22" y="58" width="226" height="74" fill="#166534"/>
  <rect x="22" y="356" width="226" height="74" fill="#166534"/>
  <line x1="22" y1="132" x2="248" y2="132" stroke="#86efac" stroke-width="1.5" opacity=".7"/>
  <line x1="22" y1="356" x2="248" y2="356" stroke="#86efac" stroke-width="1.5" opacity=".7"/>
  <!-- brick / midline marks -->
  <circle cx="135" cy="244" r="3" fill="#bbf7d0" opacity=".6"/>
  <!-- attacking arrow -->
  <text x="135" y="100" fill="#bbf7d0" font-size="11" text-anchor="middle" opacity=".85">▲ Attacking</text>
  <!-- pass path -->
  <line x1="90" y1="320" x2="160" y2="210" stroke="#fde68a" stroke-width="2.5" stroke-dasharray="5 4"/>
  <line x1="160" y1="210" x2="135" y2="100" stroke="#fff" stroke-width="2.5"/>
  <!-- players -->
  <circle cx="90" cy="320" r="11" fill="#EB8232" stroke="#fff" stroke-width="2"/><text x="90" y="324" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">A</text>
  <circle cx="160" cy="210" r="11" fill="#8B5CF6" stroke="#fff" stroke-width="2"/><text x="160" y="214" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">B</text>
  <!-- disc at receiver -->
  <circle cx="135" cy="100" r="9" fill="#fff" stroke="#EB8232" stroke-width="2"/>
  <!-- bottom action bar -->
  <g font-size="10" font-weight="600" text-anchor="middle">
    <rect x="22" y="440" width="52" height="24" rx="6" fill="#10B981"/><text x="48" y="456" fill="#fff">Score</text>
    <rect x="80" y="440" width="52" height="24" rx="6" fill="#EF4444"/><text x="106" y="456" fill="#fff">Drop</text>
    <rect x="138" y="440" width="52" height="24" rx="6" fill="#374151"/><text x="164" y="456" fill="#E5E7EB">D</text>
    <rect x="196" y="440" width="52" height="24" rx="6" fill="#374151"/><text x="222" y="456" fill="#E5E7EB">Undo</text>
  </g>
</svg>
