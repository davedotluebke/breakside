<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Full PBP — Grid of Cards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5; color: #222;
    min-height: 100dvh; display: flex; flex-direction: column;
  }

  /* ── Header (real-app shape) ── */
  .header {
    background: #6b4baa; color: #fff;
    padding: 8px 12px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
  }
  .header-top { display: flex; align-items: center; gap: 12px; flex: 1; }
  .menu, .timer { padding: 4px 10px; background: rgba(0,0,0,.2); border-radius: 6px; font-size: 13px; }
  .logo { width: 32px; height: 32px; background: #EB8232; border-radius: 50%; display: inline-block; }
  .score { font-weight: 700; letter-spacing: 1px; }

  .seg {
    display: flex; gap: 0; background: rgba(255,255,255,.12); padding: 3px; border-radius: 8px; margin-top: 6px; width: 100%;
  }
  .seg button {
    flex: 1; border: none; background: transparent; color: rgba(255,255,255,.7);
    padding: 6px 0; font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer;
  }
  .seg button.active { background: #fff; color: #EB8232; }

  /* ── Top row: mode pill + Undo ── */
  .controls {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; background: #fff; border-bottom: 1px solid #eaeaea;
  }
  .mode-pill { padding: 5px 16px; border-radius: 999px; font-weight: 600; font-size: 14px; color: #fff; background: #2563eb; }
  .undo { padding: 6px 14px; border: 1px solid #bbb; border-radius: 6px; background: #fff; font-weight: 600; font-size: 13px; }

  /* ── Card grid ── */
  .grid-wrap { flex: 1; padding: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-content: start; }

  .card {
    background: #fff; border: 1px solid #d8d8d8; border-radius: 8px;
    padding: 8px; display: flex; flex-direction: column; gap: 6px;
    min-height: 88px;
    cursor: pointer;
  }
  .card .name { font-weight: 700; font-size: 16px; }
  .card .actions { display: grid; grid-template-columns: 1fr 1fr auto; gap: 1px; margin-top: auto; }
  .card .actions button {
    border: 1px solid #c8c8c8; border-radius: 2px; background: #f7f7f7;
    font-size: 12px; padding: 4px 6px; cursor: pointer;
  }
  .card .actions .drop      { color: #b91c1c; }
  .card .actions .score     { color: #047857; }
  .card .actions .more      { color: #555; font-weight: 700; padding: 4px 8px; }
  .card .actions .throwaway { color: #b91c1c; }
  .card .actions .break     { color: #1d4ed8; }
  .card .actions .break.armed { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }

  /* Unknown player — softer */
  .card.unknown { background: #f3f4f6; border-style: dashed; border-color: #c0c0c0; }
  .card.unknown .name { color: #6b7280; font-style: italic; font-weight: 500; }

  /* Holder — prominent yellow */
  .card.holder {
    background: #fff3d6; border-color: #e0a64b; box-shadow: 0 0 0 2px rgba(224,166,75,.25);
    grid-column: 1 / -1;     /* span both columns — twice as wide */
    min-height: 110px;
  }
  .card.holder .name { font-size: 22px; }
  .card.holder .name::after { content: ' • holds the disc'; font-weight: 400; font-size: 13px; color: #92400e; font-style: italic; }
  .card.holder .actions { grid-template-columns: 1fr 1fr auto; }
  .card.holder .actions button { font-size: 14px; padding: 8px 10px; }

  /* ── Modifier strip (bottom, full width) ── */
  .modifiers {
    background: #fff; border-top: 1px solid #ddd;
    padding: 8px 12px;
  }
  .modifiers .title { font-size: 12px; color: #555; font-weight: 600; margin-bottom: 4px; }
  .modifiers .options { display: flex; gap: 12px; flex-wrap: wrap; font-size: 13px; }
  .modifiers label { display: flex; align-items: center; gap: 4px; }

  /* ── Mini log ── */
  .log {
    background: #fafafa; border-top: 1px solid #ddd;
    padding: 6px 10px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: #333; line-height: 1.5; min-height: 80px; max-height: 110px; overflow: auto;
  }
  .log div { white-space: pre; }

  /* ── Floating note for the design party ── */
  .note { position: fixed; top: 0; right: 0; background: rgba(0,0,0,.7); color: #fff; padding: 6px 10px; font-size: 11px; border-bottom-left-radius: 8px; z-index: 100; }
</style>
</head>
<body>
  <div class="note">Mockup A — Grid of Cards</div>

  <div class="header">
    <div class="header-top">
      <span class="menu">☰</span>
      <span class="logo"></span>
      <span class="score">US 14 — 2 THEM</span>
      <span class="timer">0:33 POINT</span>
    </div>
    <div class="seg">
      <button>Simple</button>
      <button class="active">Full</button>
      <button>Line</button>
      <button>Log</button>
      <button>All</button>
    </div>
  </div>

  <div class="controls">
    <div class="mode-pill">Offense</div>
    <button class="undo">↶ Undo</button>
  </div>

  <div class="grid-wrap">
    <!-- Holder spans both columns at the top -->
    <div class="card holder">
      <div class="name">Bob</div>
      <div class="actions">
        <button class="throwaway">Throwaway</button>
        <button class="break armed">Break ✓</button>
        <button class="more">…</button>
      </div>
    </div>

    <div class="card unknown">
      <div class="name">Unknown</div>
      <div class="actions">
        <button class="drop">Drop</button>
        <button class="score">Score</button>
        <button class="more">…</button>
      </div>
    </div>

    <div class="card">
      <div class="name">Alice</div>
      <div class="actions">
        <button class="drop">Drop</button>
        <button class="score">Score</button>
        <button class="more">…</button>
      </div>
    </div>

    <div class="card">
      <div class="name">Carla</div>
      <div class="actions">
        <button class="drop">Drop</button>
        <button class="score">Score</button>
        <button class="more">…</button>
      </div>
    </div>

    <div class="card">
      <div class="name">Daniel</div>
      <div class="actions">
        <button class="drop">Drop</button>
        <button class="score">Score</button>
        <button class="more">…</button>
      </div>
    </div>

    <div class="card">
      <div class="name">Gina</div>
      <div class="actions">
        <button class="drop">Drop</button>
        <button class="score">Score</button>
        <button class="more">…</button>
      </div>
    </div>

    <div class="card">
      <div class="name">Harold</div>
      <div class="actions">
        <button class="drop">Drop</button>
        <button class="score">Score</button>
        <button class="more">…</button>
      </div>
    </div>

    <div class="card">
      <div class="name">John</div>
      <div class="actions">
        <button class="drop">Drop</button>
        <button class="score">Score</button>
        <button class="more">…</button>
      </div>
    </div>
  </div>

  <div class="modifiers">
    <div class="title">Last pass was a:</div>
    <div class="options">
      <label><input type="checkbox"> huck</label>
      <label><input type="checkbox" checked> break</label>
      <label><input type="checkbox"> hammer</label>
      <label><input type="checkbox"> dump</label>
      <label><input type="checkbox"> sky</label>
      <label><input type="checkbox"> layout</label>
    </div>
  </div>

  <div class="log">
    <div>D  Pull by Alice (Good Pull)</div>
    <div>D  Unforced error</div>
    <div>O  Alice throws to Bob</div>
    <div>O  Bob throws a break to Alice</div>
  </div>
</body>
</html>
