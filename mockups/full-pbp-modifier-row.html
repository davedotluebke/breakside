<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Full PBP — Modifier Row Below Players</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5; color: #222;
    min-height: 100dvh; display: flex; flex-direction: column;
  }

  /* ── Header (matches real app) ── */
  .header { background: #6b4baa; color: #fff; padding: 8px 12px; display: flex; flex-direction: column; gap: 6px; }
  .header-top { display: flex; align-items: center; gap: 12px; }
  .menu, .timer { padding: 4px 10px; background: rgba(0,0,0,.2); border-radius: 6px; font-size: 13px; }
  .logo { width: 32px; height: 32px; background: #EB8232; border-radius: 50%; display: inline-block; }
  .score { font-weight: 700; letter-spacing: 1px; flex: 1; }

  .seg { display: flex; gap: 0; background: rgba(255,255,255,.12); padding: 3px; border-radius: 8px; }
  .seg button { flex: 1; border: none; background: transparent; color: rgba(255,255,255,.7); padding: 6px 0; font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer; }
  .seg button.active { background: #fff; color: #EB8232; }

  /* ── Top controls: simpler — just pill + undo ── */
  .controls {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; background: #fff; border-bottom: 1px solid #eaeaea;
  }
  .mode-pill { padding: 5px 16px; border-radius: 999px; font-weight: 600; font-size: 14px; color: #fff; background: #2563eb; }
  .undo { padding: 6px 14px; border: 1px solid #bbb; border-radius: 6px; background: #fff; font-weight: 600; font-size: 13px; }

  /* ── Player rows fill full width ── */
  .rows-wrap { flex: 1; padding: 6px; overflow-y: auto; }
  .row {
    display: grid; grid-template-columns: minmax(0, 1fr) auto;
    align-items: stretch;
    margin-bottom: 4px;
    border: 1px solid #ddd; border-radius: 6px; background: #fff;
    overflow: hidden; min-height: 44px;
  }
  .row.holder { background: #fff3d6; border-color: #e0a64b; box-shadow: 0 0 0 2px rgba(224,166,75,.25); }
  .row.unknown { background: #f3f4f6; border-style: dashed; border-color: #c0c0c0; }
  .row.unknown .name { color: #6b7280; font-style: italic; font-weight: 500; }
  .row .name { padding: 8px 10px; font-weight: 600; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .actions { display: grid; grid-template-columns: auto auto auto; gap: 1px; padding: 0; }
  .row .actions button {
    margin: 0; min-width: 0;
    border: 1px solid #c8c8c8; border-radius: 2px; background: #f7f7f7;
    font-size: 13px; padding: 5px 8px;
  }
  .row .actions .throwaway { color: #b91c1c; }
  .row .actions .break { color: #1d4ed8; }
  .row .actions .break.armed { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
  .row .actions .drop { color: #b91c1c; }
  .row .actions .score { color: #047857; }
  .row .actions .more { color: #555; font-weight: 700; padding: 5px 6px; }

  /* ── Modifier row — horizontal full-width strip below players ── */
  .modifier-row {
    background: #fff; border-top: 1px solid #ddd;
    padding: 8px 10px;
    display: flex; align-items: center; gap: 10px;
    overflow-x: auto;
  }
  .modifier-row .label {
    font-size: 12px; color: #555; font-weight: 600; flex: 0 0 auto;
  }
  .modifier-row .options {
    display: flex; gap: 6px; flex: 1 1 auto;
  }
  .modifier-row label.chip {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 999px;
    border: 1px solid #cfcfcf; background: #f7f7f7;
    font-size: 13px; cursor: pointer;
    user-select: none;
  }
  .modifier-row label.chip input[type="checkbox"] { display: none; }
  .modifier-row label.chip.checked {
    background: #1d4ed8; border-color: #1d4ed8; color: #fff;
  }

  /* ── Bottom action row ── */
  .bottom-actions {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 6px;
    padding: 8px 12px; background: #fff; border-top: 1px solid #ddd;
  }
  .bottom-actions button {
    border-radius: 6px; padding: 10px 6px;
    font-weight: 600; font-size: 14px; line-height: 1.2;
  }
  .they-turnover { border: 1px solid #16a34a; background: #dcfce7; color: #166534; }
  .they-score    { border: 1px solid #dc2626; background: #fee2e2; color: #991b1b; }
  .game-events   { border: 1px solid #aaa;    background: #f4f4f4; color: #555; padding: 10px 14px; }

  /* ── Mini log ── */
  .log { background: #fafafa; border-top: 1px solid #ddd; padding: 6px 10px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #333; line-height: 1.5; min-height: 70px; max-height: 100px; overflow: auto; }

  /* ── Note ── */
  .note { position: fixed; top: 0; right: 0; background: rgba(0,0,0,.7); color: #fff; padding: 6px 10px; font-size: 11px; border-bottom-left-radius: 8px; z-index: 100; }
</style>
</head>
<body>
  <div class="note">Mockup E — Modifier Row at Bottom of Players</div>

  <div class="header">
    <div class="header-top">
      <span class="menu">☰</span>
      <span class="logo"></span>
      <span class="score">US 14 — 2 THEM</span>
      <span class="timer">0:33 POINT</span>
    </div>
    <div class="seg">
      <button>Simple</button>
      <button class="active">Full</button>
      <button>Line</button>
      <button>Log</button>
      <button>All</button>
    </div>
  </div>

  <div class="controls">
    <div class="mode-pill">Offense</div>
    <button class="undo">↶ Undo</button>
  </div>

  <div class="rows-wrap">
    <div class="row unknown">
      <div class="name">Unknown</div>
      <div class="actions">
        <button class="drop">Drop</button>
        <button class="score">Score</button>
        <button class="more">…</button>
      </div>
    </div>
    <div class="row">
      <div class="name">Alice</div>
      <div class="actions">
        <button class="drop">Drop</button>
        <button class="score">Score</button>
        <button class="more">…</button>
      </div>
    </div>
    <div class="row holder">
      <div class="name">Bob</div>
      <div class="actions">
        <button class="throwaway">Throwaway</button>
        <button class="break armed">Break ✓</button>
        <button class="more">…</button>
      </div>
    </div>
    <div class="row">
      <div class="name">Carla</div>
      <div class="actions">
        <button class="drop">Drop</button>
        <button class="score">Score</button>
        <button class="more">…</button>
      </div>
    </div>
    <div class="row">
      <div class="name">Daniel</div>
      <div class="actions">
        <button class="drop">Drop</button>
        <button class="score">Score</button>
        <button class="more">…</button>
      </div>
    </div>
    <div class="row">
      <div class="name">Gina</div>
      <div class="actions">
        <button class="drop">Drop</button>
        <button class="score">Score</button>
        <button class="more">…</button>
      </div>
    </div>
    <div class="row">
      <div class="name">Harold</div>
      <div class="actions">
        <button class="drop">Drop</button>
        <button class="score">Score</button>
        <button class="more">…</button>
      </div>
    </div>
    <div class="row">
      <div class="name">John</div>
      <div class="actions">
        <button class="drop">Drop</button>
        <button class="score">Score</button>
        <button class="more">…</button>
      </div>
    </div>
  </div>

  <div class="modifier-row">
    <span class="label">Last pass was a:</span>
    <div class="options">
      <label class="chip"><input type="checkbox"> huck</label>
      <label class="chip checked"><input type="checkbox" checked> break</label>
      <label class="chip"><input type="checkbox"> hammer</label>
      <label class="chip"><input type="checkbox"> dump</label>
      <label class="chip"><input type="checkbox"> sky</label>
      <label class="chip"><input type="checkbox"> layout</label>
    </div>
  </div>

  <div class="bottom-actions">
    <button class="they-turnover">They turnover</button>
    <button class="game-events" title="Timeout, injury sub, halftime, etc.">⚙ Events</button>
    <button class="they-score">They score</button>
  </div>

  <div class="log">
    <div>D  Pull by Alice (Good Pull)</div>
    <div>D  Unforced error</div>
    <div>O  Alice throws to Bob</div>
    <div>O  Bob throws a break to Alice</div>
  </div>
</body>
</html>
